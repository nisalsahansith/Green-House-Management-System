spring:
    application:
        name: api-gateway
    cloud:
        gateway:
            server:
                webflux:
                    routes:
                        - id: zone-management-service
                          uri: lb://zone-management-service
                          predicates:
                              - Path=/zone-management-service/**

                        - id: sensor-telemetry-service
                          uri: lb://sensor-telemetry-service
                          predicates:
                              - Path=/sensor-telemetry-service/**

                        - id: automation-control-service
                          uri: http://localhost:3000
                          predicates:
                              - Path=/automation-control-service/**

                        - id: crop-inventory-service
                          uri: http://localhost:3000
                          predicates:
                              - Path=/crop-inventory-service/**



server:
    port: 8080

eureka:
    client:
        service-url:
            defaultZone: http://localhost:8761/eureka/